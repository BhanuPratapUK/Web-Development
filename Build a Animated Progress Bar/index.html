<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@200;300;400;500;600;700;800&family=Rubik+Bubbles&family=Signika+Negative:wght@300..700&display=swap" rel="stylesheet">
    <title>Progress Bar</title>
</head>
<body>
    <div class="container">
        <div class="progress-bar-wrapper">
            <h3>Loading...</h3>
            <div class="progress-bar">
                <div class="bar"></div>
            </div>
            <div class="buttons">
                <button class="btn download">Down</button>
                <button class="btn reset">Reset</button>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
